<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>누리다 농사 날씨 예측</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <!-- Teachable Machine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <button id="themeToggle">DARK MODE</button>
            <h1><i class="fas fa-seedling"></i> 누리다 농사 날씨 예측</h1>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="도시 이름을 입력하세요 (예: Seoul)...">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
        </header>

        <main id="weatherContent" class="hidden">
            <section class="current-weather">
                <!-- ... (Weather content) ... -->
                <div class="main-info">
                    <h2 id="cityName">서울</h2>
                    <div class="temp-container">
                        <span id="currentTemp">--</span>°C
                        <i id="weatherIcon" class="fas fa-sun"></i>
                    </div>
                    <p id="weatherDesc">맑음</p>
                </div>
                <div class="details">
                    <div class="detail-item">
                        <i class="fas fa-tint"></i>
                        <span>습도</span>
                        <span id="humidity">--%</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-wind"></i>
                        <span>풍속</span>
                        <span id="windSpeed">--m/s</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-cloud-rain"></i>
                        <span>강수확률</span>
                        <span id="rainProb">--%</span>
                    </div>
                </div>
            </section>

            <section class="farming-advice">
                <h3><i class="fas fa-lightbulb"></i> 오늘 특화 농사 정보</h3>
                <div class="advice-grid">
                    <div class="advice-card" id="sowingAdvice">
                        <i class="fas fa-leaf"></i>
                        <h4>파종/심기</h4>
                        <p>데이터 로딩 중...</p>
                    </div>
                    <div class="advice-card" id="pestAdvice">
                        <i class="fas fa-bug"></i>
                        <h4>병해충 주의</h4>
                        <p>데이터 로딩 중...</p>
                    </div>
                    <div class="advice-card" id="workAdvice">
                        <i class="fas fa-tools"></i>
                        <h4>농작업 추천</h4>
                        <p>데이터 로딩 중...</p>
                    </div>
                </div>
            </section>

            <!-- AI Diagnosis Section -->
            <section class="ai-diagnosis">
                <h3><i class="fas fa-microscope"></i> AI 병해충 실시간 진단</h3>
                <div class="ai-container">
                    <div id="webcam-container"></div>
                    <div class="diagnosis-info">
                        <button type="button" id="startAiBtn" class="ai-btn">진단 시작하기</button>
                        <div id="label-container"></div>
                        <div id="diagnosis-result" class="result-box hidden">
                            <h4 id="result-label">진단 결과: --</h4>
                            <p id="result-desc">카메라를 작물에 비춰주세요.</p>
                        </div>
                    </div>
                </div>
            </section>

            <section class="forecast">
                <h3><i class="fas fa-calendar-alt"></i> 주간 예보</h3>
                <div id="forecastContainer" class="forecast-list">
                    <!-- Forecast items will be injected here -->
                </div>
            </section>

            <section class="contact-section">
                <!-- ... (Contact content) ... -->
                <h3><i class="fas fa-envelope"></i> 제휴 문의</h3>
                <form action="https://formspree.io/f/mgorjppl" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" name="email" id="email" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea name="message" id="message" rows="4" placeholder="제휴 관련 문의 내용을 입력해주세요..." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">문의 보내기</button>
                </form>
            </section>

            <section class="comments-section">
                <!-- ... (Disqus content) ... -->
                <h3><i class="fas fa-comments"></i> 댓글</h3>
                <div id="disqus_thread"></div>
                <script>
                    /**
                    *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                    *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                    /*
                    var disqus_config = function () {
                    this.page.url = window.location.href;  // Replace PAGE_URL with your page's canonical URL variable
                    this.page.identifier = window.location.pathname; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                    };
                    */
                    (function() { // DON'T EDIT BELOW THIS LINE
                    var d = document, s = d.createElement('script');
                    s.src = 'https://product-nurida-lecture-3.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                    })();
                </script>
                <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
            </section>
        </main>

        <div id="loading" class="loader">
            <div class="spinner"></div>
            <p>날씨 정보를 가져오는 중입니다...</p>
        </div>

        <div id="error" class="error-msg hidden">
            <p>날씨 정보를 가져오는데 실패했습니다. 도시 이름을 확인해주세요.</p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
